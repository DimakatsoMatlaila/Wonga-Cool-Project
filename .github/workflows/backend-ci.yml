name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: userauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: ./backend
      run: dotnet restore

    - name: Build
      working-directory: ./backend
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      working-directory: ./backend
      run: dotnet test tests/UserAuth.Tests.Unit/UserAuth.Tests.Unit.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Run Integration Tests
      working-directory: ./backend
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=userauth_test;Username=postgres;Password=postgres"
      run: dotnet test tests/UserAuth.Tests.Integration/UserAuth.Tests.Integration.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Backend Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/test-results.trx
          **/integration-test-results.trx

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: ./backend
      run: dotnet restore

    - name: Build
      working-directory: ./backend
      run: dotnet build --no-restore --configuration Release

    - name: Run Code Analysis
      working-directory: ./backend
      run: dotnet format --verify-no-changes --no-restore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: userauth-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
