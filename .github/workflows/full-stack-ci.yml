name: Full Stack CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Pipeline
    uses: ./.github/workflows/backend-ci.yml

  frontend:
    name: Frontend Pipeline
    uses: ./.github/workflows/frontend-ci.yml

  integration:
    name: Full Stack Integration Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cp .env.example .env
        sed -i 's/your_secure_password_here/postgres/g' .env
        sed -i 's/your_very_secure_jwt_secret_key_at_least_32_characters_long/ThisIsAVerySecretKeyForJWTTokenGenerationWithAtLeast32Characters!/g' .env

    - name: Start services with Docker Compose
      run: docker-compose up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to start..."
        sleep 30
        docker-compose ps

    - name: Check service health
      run: |
        echo "Checking API health..."
        curl -f http://localhost:5000/health || exit 1
        echo "Checking Frontend..."
        curl -f http://localhost:3000 || exit 1

    - name: Run API smoke tests
      run: |
        echo "Testing registration endpoint..."
        curl -X POST http://localhost:5000/api/auth/register \
          -H "Content-Type: application/json" \
          -d '{"firstName":"Test","lastName":"User","email":"test@example.com","password":"Password123!"}' \
          --fail-with-body || exit 1

    - name: Show logs on failure
      if: failure()
      run: docker-compose logs

    - name: Cleanup
      if: always()
      run: docker-compose down -v
