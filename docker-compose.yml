services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: userauth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - userauth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: userauth-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userauth;Username=postgres;Password=postgres
      - Jwt__SecretKey=ThisIsAVerySecretKeyForJWTTokenGenerationWithAtLeast32Characters!
      - Jwt__Issuer=UserAuthAPI
      - Jwt__Audience=UserAuthClient
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://frontend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - userauth-network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: userauth-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - userauth-network
    restart: unless-stopped

networks:
  userauth-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
